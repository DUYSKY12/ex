openapi: 3.0.3
info:
  title: Notification Service API
  description: Gửi email thông báo đặt phòng và hủy phòng qua Mailhog
  version: 1.0.0

servers:
  - url: http://localhost:5004
    description: Local development
  - url: http://notification-service:5004
    description: Docker internal

tags:
  - name: health
    description: Health check
  - name: notifications
    description: Gửi và xem lịch sử thông báo

paths:

  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /notifications/booking-confirmed:
    post:
      tags: [notifications]
      summary: Gửi email xác nhận đặt phòng (internal)
      description: Được gọi bởi Booking Service sau khi tạo booking thành công
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingNotificationRequest'
      responses:
        '200':
          description: Email đã được gửi (hoặc xếp hàng gửi)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /notifications/booking-cancelled:
    post:
      tags: [notifications]
      summary: Gửi email xác nhận hủy phòng (internal)
      description: Được gọi bởi Booking Service sau khi hủy booking thành công
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingNotificationRequest'
      responses:
        '200':
          description: Email đã được gửi (hoặc xếp hàng gửi)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /notifications:
    get:
      tags: [notifications]
      summary: Lấy lịch sử thông báo (Admin only)
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [booking_confirmed, booking_cancelled]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, sent, failed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lịch sử thông báo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

components:

  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    BookingNotificationRequest:
      type: object
      required: [user, booking]
      properties:
        user:
          type: object
          required: [name, email]
          properties:
            name:
              type: string
              example: "Phạm Thành Đạt"
            email:
              type: string
              format: email
              example: "dat@example.com"
        booking:
          type: object
          required: [id, room_id, check_in, check_out, total_price]
          properties:
            id:
              type: string
              format: uuid
              example: "770e8400-e29b-41d4-a716-446655440002"
            room_id:
              type: string
              format: uuid
            check_in:
              type: string
              format: date
              example: "2024-12-01"
            check_out:
              type: string
              format: date
              example: "2024-12-05"
            total_price:
              type: number
              format: float
              example: 2000000

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, sent, failed]
          example: "sent"
        message:
          type: string
          example: "Email sent successfully"

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [booking_confirmed, booking_cancelled]
        email:
          type: string
          format: email
        status:
          type: string
          enum: [pending, sent, failed]
        sent_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Dữ liệu đầu vào không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
