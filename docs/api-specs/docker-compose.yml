version: '3.8'

services:
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.9.1
    container_name: swagger-ui-docs
    ports:
      - "8081:8080"
    environment:
      URLS: "[
        { url: '/specs/auth-service.yaml', name: 'Auth Service API' },
        { url: '/specs/room-service.yaml', name: 'Room Service API' },
        { url: '/specs/booking-service.yaml', name: 'Booking Service API' },
        { url: '/specs/payment-service.yaml', name: 'Payment Service API' },
        { url: '/specs/notification-service.yaml', name: 'Notification Service API' }
      ]"
    volumes:
      - ./:/usr/share/nginx/html/specs
    restart: unless-stopped
