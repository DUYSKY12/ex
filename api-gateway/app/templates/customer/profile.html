{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="hero-banner" style="padding: 3rem 4rem; margin-bottom: 2rem; background: linear-gradient(135deg, #0f172a 0%, #171723 100%);">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem;">
        <div>
            <h1 class="hero-title" style="font-size: 2.2rem; display:flex; align-items:center; gap:0.75rem;">
                <span>🧾</span> Lịch sử mua hàng
            </h1>
            <p class="hero-subtitle">Xem thông tin các đơn hàng bạn đã mua tại AD Shop.</p>
        </div>
        <button id="btn-clear-history" onclick="deleteAllOrders()" style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; padding:0.8rem 1.5rem; border-radius:12px; font-weight:700; cursor:pointer; font-size:0.95rem; transition:all 0.2s; display:none;" onmouseover="this.style.background='rgba(239,68,68,0.2)'" onmouseout="this.style.background='rgba(239,68,68,0.1)'">🗑️ Xóa toàn bộ lịch sử</button>
    </div>
</div>

<div id="orders-container">
    <p style="text-align:center; color:#666; padding:3rem;">Đang tải lịch sử...</p>
</div>

<script>
async function fetchOrders() {
    const customerId = localStorage.getItem('customerId');
    if (!customerId) {
        document.getElementById('orders-container').innerHTML = '<p style="text-align:center;color:#666;padding:3rem;">Vui lòng đăng nhập để xem lịch sử.</p>';
        return;
    }
    try {
        const resp = await fetch(`/api/proxy/customer/api/order/${customerId}`);
        const orders = await resp.json();
        renderOrders(orders);
    } catch (err) {
        document.getElementById('orders-container').innerHTML = '<p style="text-align:center;color:#e55;padding:3rem;">Không thể tải lịch sử.</p>';
    }
}

function formatPrice(price) {
    return Number(price).toLocaleString('vi-VN') + ' đ';
}

function renderOrders(orders) {
    const container = document.getElementById('orders-container');
    if (!orders || orders.length === 0) {
        container.innerHTML = `
            <div style="text-align:center; padding:5rem 1rem; color:#555;">
                <div style="font-size:3.5rem; margin-bottom:1rem; opacity:0.4;">🧾</div>
                <p style="font-size:1.1rem; font-weight:600; margin-bottom:0.5rem;">Chưa có đơn hàng nào</p>
                <p style="font-size:0.9rem;">Hãy mua sắm để tạo đơn hàng đầu tiên!</p>
                <a href="/" style="display:inline-block; margin-top:1.5rem; padding:0.75rem 2rem; background: var(--brand-blue); color:#fff; border-radius:12px; text-decoration:none; font-weight:700;">Mua sắm ngay</a>
            </div>
        `;
        return;
    }

    // Show newest first, numbered oldest = highest number
    const total = orders.length;
    container.innerHTML = orders.map((order, index) => {
        const orderNum = total - index; // Newest = highest number
        const date = new Date(order.createdAt).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        const items = order.items || [];

        const itemsHtml = items.map(item => {
            const type = item.productType === 'laptop' ? '💻' : '📱';
            const productLabel = item.productName || (item.productType === 'laptop' ? 'Laptop' : 'Điện thoại');
            return `
                <div style="display:flex; align-items:center; gap:0.75rem; padding:0.6rem 0; border-bottom:1px solid rgba(255,255,255,0.04);">
                    <span style="font-size:1.4rem;">${type}</span>
                    <div style="flex:1;">
                        <div style="font-size:0.85rem; color:#ddd; font-weight:600;">${productLabel}</div>
                        <div style="font-size:0.78rem; color:#555;">x${item.quantity}</div>
                    </div>
                    <div style="font-weight:700; color:#10b981; font-size:0.88rem; white-space:nowrap;">${formatPrice(Number(item.price) * item.quantity)}</div>
                </div>
            `;
        }).join('');

        const statusMap = { paid: { label: 'Đã thanh toán', color: '#34d399', bg: 'rgba(16,185,129,0.12)', border: 'rgba(16,185,129,0.3)' } };
        const s = statusMap[order.status] || { label: order.status, color: '#94a3b8', bg: 'rgba(148,163,184,0.1)', border: 'rgba(148,163,184,0.2)' };

        const payMap = {
            'COD': 'Giao hàng nhận tiền (COD)',
            'BANK_VCB': 'Chuyển khoản (Vietcombank)',
            'BANK_TECHCOM': 'Chuyển khoản (Techcombank)',
            'BANK_MB': 'Chuyển khoản (MB Bank)',
            'BANK_MOMO': 'Thanh toán (Ví MoMo)'
        };
        const paymentLabel = payMap[order.paymentMethod] || 'Chuyển khoản / Thẻ';

        return `
            <div id="order-card-${order.id}" style="background:var(--bg-card); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin-bottom:1.5rem; transition: border-color 0.2s;">
                <!-- Header -->
                <div style="display:flex; justify-content:space-between; align-items:center; padding:1.25rem 1.5rem; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.06);">
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <div style="width:36px; height:36px; background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; color:#93c5fd; font-size:0.9rem; font-family:'Outfit',sans-serif;">
                            ${orderNum}
                        </div>
                        <div>
                            <div style="font-weight:700; color:#f0f0f5; font-size:0.95rem;">Đơn hàng #${orderNum}</div>
                            <div style="font-size:0.75rem; color:#555; margin-top:4px;">${date}</div>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.75rem;">
                        <span style="font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:999px; background:${s.bg}; color:${s.color}; border:1px solid ${s.border};">${s.label}</span>
                        <button onclick="deleteOrder('${order.id}', ${orderNum})" style="background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#f87171; padding:5px 12px; border-radius:8px; cursor:pointer; font-size:0.78rem; font-weight:700; transition: all 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.18)'" onmouseout="this.style.background='rgba(239,68,68,0.08)'">🗑️ Xóa</button>
                    </div>
                </div>

                <!-- Items -->
                <div style="padding:0.5rem 1.5rem;">
                    ${itemsHtml}
                </div>

                <!-- Total -->
                <div style="display:flex; justify-content:space-between; align-items:flex-end; padding:1rem 1.5rem; border-top:1px solid rgba(255,255,255,0.06);">
                    <div style="color:#888; font-size:0.85rem; max-width:65%;">
                        <div style="margin-bottom:6px;">👤 Người nhận: <span style="color:#ccc; font-weight:600;">${order.customerName || 'Chưa cập nhật'}</span> - <span style="color:#3b82f6;">${order.customerPhone || 'Chưa có SĐT'}</span></div>
                        <div style="margin-bottom:6px; line-height:1.4;">📍 Địa chỉ: <span style="color:#ccc;">${order.shippingAddress || 'Khách nhận tại kho'}</span></div>
                        <div>💳 Thanh toán: <span style="color:#10b981; font-weight:600;">${paymentLabel}</span></div>
                    </div>
                    <div style="text-align:right;">
                        <div style="color:#666; font-size:0.88rem; margin-bottom:4px;">${items.length} sản phẩm</div>
                        <div style="font-weight:900; font-size:1.2rem; color:#f87171; font-family:'Outfit',sans-serif;">
                            Tổng: ${formatPrice(order.totalAmount)}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

async function deleteOrder(orderId, orderNum) {
    const customerId = localStorage.getItem('customerId');
    if (!confirm(`Bạn có chắc muốn xóa đơn hàng #${orderNum} không?`)) return;
    try {
        const resp = await fetch(`/api/proxy/customer/api/order/${customerId}/${orderId}`, { method: 'DELETE' });
        if (resp.ok) {
            const card = document.getElementById(`order-card-${orderId}`);
            if (card) {
                card.style.transition = 'all 0.35s ease';
                card.style.opacity = '0';
                card.style.transform = 'scale(0.97)';
                setTimeout(() => { card.remove(); checkEmpty(); }, 350);
            }
        } else {
            alert('Không thể xóa đơn hàng. Thử lại!');
        }
    } catch (err) {
        alert('Lỗi hệ thống!');
    }
}

async function deleteAllOrders() {
    const customerId = localStorage.getItem('customerId');
    if (!confirm('Bạn có CỰC KỲ CHẮC CHẮN muốn xóa BỘ nhớ lịch sử đơn hàng của mình không? Không thể phục hồi lại được đâu nhé!')) return;
    try {
        const resp = await fetch(`/api/proxy/customer/api/order/${customerId}/all`, { method: 'DELETE' });
        if (resp.ok) {
            document.getElementById('orders-container').innerHTML = '';
            checkEmpty();
        } else {
            alert('Không thể xóa lịch sử. Vui lòng thử lại!');
        }
    } catch (e) {
        alert('Lỗi kết nối xóa lịch sử!');
    }
}

function checkEmpty() {
    const remaining = document.querySelectorAll('[id^="order-card-"]');
    if (remaining.length === 0) {
        document.getElementById('orders-container').innerHTML = `
            <div style="text-align:center; padding:5rem 1rem; color:#555;">
                <div style="font-size:3.5rem; margin-bottom:1rem; opacity:0.4;">🧾</div>
                <p style="font-size:1.1rem; font-weight:600;">Chưa có đơn hàng nào</p>
                <a href="/" style="display:inline-block; margin-top:1.5rem; padding:0.75rem 2rem; background: var(--brand-blue); color:#fff; border-radius:12px; text-decoration:none; font-weight:700;">Mua sắm ngay</a>
            </div>
        `;
        const btnClear = document.getElementById('btn-clear-history');
        if (btnClear) btnClear.style.display = 'none';
    } else {
        const btnClear = document.getElementById('btn-clear-history');
        if (btnClear) btnClear.style.display = 'block';
    }
}

fetchOrders();
</script>
{% endblock %}
