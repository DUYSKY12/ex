{% extends 'base.html' %}
{% load static %}

{% block content %}




<!-- LAPTOP SECTION -->
<div id="laptops">
    <div class="section-header">
        <h2 class="section-tag">💻 LAPTOP</h2>
        <span id="laptop-count" class="count-badge"></span>
    </div>
    <div class="product-grid" id="laptop-grid">
        <p style="color:#666;">Đang tải...</p>
    </div>
</div>

<div style="height:1px; background:linear-gradient(90deg,transparent,rgba(59,130,246,0.3),rgba(139,92,246,0.3),transparent); margin: 2rem 0 3rem;"></div>

<!-- MOBILE SECTION -->
<div id="mobiles">
    <div class="section-header">
        <h2 class="section-tag">📱 ĐIỆN THOẠI</h2>
        <span id="mobile-count" class="count-badge"></span>
    </div>
    <div class="product-grid" id="mobile-grid">
        <p style="color:#666;">Đang tải...</p>
    </div>
</div>

<div style="height:1px; background:linear-gradient(90deg,transparent,rgba(139,92,246,0.3),rgba(16,185,129,0.3),transparent); margin: 2rem 0 3rem;"></div>

<!-- CLOTHES SECTION -->
<div id="clothes">
    <div class="section-header">
        <h2 class="section-tag">👕 THỜI TRANG</h2>
        <span id="clothes-count" class="count-badge"></span>
    </div>
    <div class="product-grid" id="clothes-grid">
        <p style="color:#666;">Đang tải...</p>
    </div>
</div>

<div style="height:1px; background:linear-gradient(90deg,transparent,rgba(236,72,153,0.3),rgba(239,68,68,0.3),transparent); margin: 2rem 0 3rem;"></div>

<!-- OTHER PRODUCTS SECTION -->
<div id="other-products">
    <div class="section-header">
        <h2 class="section-tag" style="background: rgba(236,72,153,0.15); color: #f472b6; border-color: rgba(236,72,153,0.3);">📦 SẢN PHẨM KHÁC</h2>
        <span id="other-count" class="count-badge"></span>
    </div>
    <div class="product-grid" id="other-grid">
        <p style="color:#666;">Đang tải...</p>
    </div>
</div>

<script>
// --- Image map: brand/name keywords → reliable image URLs ---
const LAPTOP_IMAGES = {
    'macbook': 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&auto=format&fit=crop',
    'dell':    'https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400&auto=format&fit=crop',
    'asus rog': 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=400&auto=format&fit=crop',
    'asus':    'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=400&auto=format&fit=crop',
    'hp':      'https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400&auto=format&fit=crop',
    'lenovo':  'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&auto=format&fit=crop',
    'msi':     'https://images.unsplash.com/photo-1593640495253-23196b27a87f?w=400&auto=format&fit=crop',
    'acer':    'https://images.unsplash.com/photo-1541807084-5c52b6b3adef?w=400&auto=format&fit=crop',
    'default': 'https://images.unsplash.com/photo-1484788984921-03950022c38b?w=400&auto=format&fit=crop'
};

const MOBILE_IMAGES = {
    'iphone':   'https://images.unsplash.com/photo-1510557880182-3d4d3cba3f21?w=400&auto=format&fit=crop',
    'samsung':  'https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=400&auto=format&fit=crop',
    'google pixel': 'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=400&auto=format&fit=crop',
    'xiaomi':   'https://images.unsplash.com/photo-1582539655293-1b09fd1c5e75?w=400&auto=format&fit=crop',
    'oppo':     'https://images.unsplash.com/photo-1614438983-91d9d3851b49?w=400&auto=format&fit=crop',
    'vivo':     'https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=400&auto=format&fit=crop',
    'default':  'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400&auto=format&fit=crop'
};

const CLOTHES_IMAGES = {
    'áo thun': 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&auto=format&fit=crop',
    'quần jeans': 'https://images.unsplash.com/photo-1542272604-780c96852d62?w=400&auto=format&fit=crop',
    'áo khoác': 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400&auto=format&fit=crop',
    'áo sơ mi': 'https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?w=400&auto=format&fit=crop',
    'default': 'https://images.unsplash.com/photo-1489987707023-af0825ae1eef?w=400&auto=format&fit=crop'
};

function getImage(name, brand, type) {
    const key = ((name || '') + ' ' + (brand || '')).toLowerCase();
    const map = type === 'laptop' ? LAPTOP_IMAGES : type === 'mobile' ? MOBILE_IMAGES : CLOTHES_IMAGES;
    for (const [k, url] of Object.entries(map)) {
        if (k !== 'default' && key.includes(k)) return url;
    }
    return map['default'];
}

function renderProduct(product, type) {
    const defaultImage = type === 'laptop' ? LAPTOP_IMAGES.default : type === 'mobile' ? MOBILE_IMAGES.default : CLOTHES_IMAGES.default;
    const imgUrl = product.imageUrl && product.imageUrl.startsWith('http') 
        ? product.imageUrl 
        : getImage(product.name, product.brand, type);
    
    // Style tags based on product type
    let tagBg, tagColor, tagBorder, iconLabel;
    if (type === 'laptop') { tagBg = 'rgba(59,130,246,0.15)'; tagColor = '#93c5fd'; tagBorder = 'rgba(59,130,246,0.3)'; iconLabel = '💻 Laptop'; }
    else if (type === 'mobile') { tagBg = 'rgba(139,92,246,0.15)'; tagColor = '#c4b5fd'; tagBorder = 'rgba(139,92,246,0.3)'; iconLabel = '📱 Mobile'; }
    else { tagBg = 'rgba(16,185,129,0.15)'; tagColor = '#6ee7b7'; tagBorder = 'rgba(16,185,129,0.3)'; iconLabel = '👕 Clothes'; }

    return `
        <div class="product-card">
            <div class="card-image-wrapper">
                <img src="${imgUrl}" alt="${product.name}" onerror="this.src='${defaultImage}'">
            </div>
            <div class="card-body">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                    <span style="font-size:0.7rem; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.08em;">${product.brand || ''}</span>
                    <span style="font-size:0.62rem; font-weight:800; padding:3px 9px; border-radius:999px; background:${tagBg}; color:${tagColor}; border:1px solid ${tagBorder}; text-transform:uppercase;">
                        ${iconLabel}
                    </span>
                </div>
                <h3 class="card-name">${product.name}</h3>
                <p style="font-size:0.82rem; color:#55556a; margin-bottom:1rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${product.description || ''}</p>
                <div style="margin-top:auto; display:flex; align-items:flex-end; justify-content:space-between; padding-top:1rem; border-top:1px solid rgba(255,255,255,0.07);">
                    <div>
                        <div class="card-price">${Number(product.price).toLocaleString('vi-VN')} đ</div>
                        <div style="font-size:0.73rem; color:#55556a; margin-top:3px;">Còn: ${product.stock || 0} sản phẩm</div>
                    </div>
                    <button class="btn-add" onclick="addToCart('${product.id}', '${type}', '${product.name.replace(/'/g, "\\'")}', ${product.price})">Mua ngay</button>
                </div>
            </div>
        </div>
    `;
}

let allData = { laptops: [], mobiles: [] };

async function fetchProducts() {
    try {
        const resp = await fetch('/api/products/');
        const data = await resp.json();
        allData = data;
        displayData(data);
    } catch (err) {
        console.error('Error fetching products:', err);
    }
}

function displayData(data, categoryOverride) {
    const laptops = data.laptops || [];
    const mobiles = data.mobiles || [];
    const clothes = data.clothes || [];
    const other = data.other || [];

    document.getElementById('laptop-count').textContent = `( ${laptops.length} sản phẩm )`;
    document.getElementById('mobile-count').textContent = `( ${mobiles.length} sản phẩm )`;
    if(document.getElementById('clothes-count')) document.getElementById('clothes-count').textContent = `( ${clothes.length} sản phẩm )`;
    if(document.getElementById('other-count')) document.getElementById('other-count').textContent = `( ${other.length} sản phẩm )`;

    const laptopGrid = document.getElementById('laptop-grid');
    const mobileGrid = document.getElementById('mobile-grid');
    const clothesGrid = document.getElementById('clothes-grid');
    const otherGrid = document.getElementById('other-grid');

    if (laptopGrid) laptopGrid.innerHTML = laptops.length ? laptops.map(p => renderProduct(p, 'laptop')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';
    if (mobileGrid) mobileGrid.innerHTML = mobiles.length ? mobiles.map(p => renderProduct(p, 'mobile')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';
    if (clothesGrid) clothesGrid.innerHTML = clothes.length ? clothes.map(p => renderProduct(p, 'clothes')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';
    if (otherGrid) otherGrid.innerHTML = other.length ? other.map(p => renderProduct(p, p.type ? p.type.toLowerCase() : 'other')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';

    if (laptopGrid) laptopGrid.innerHTML = laptops.length ? laptops.map(p => renderProduct(p, 'laptop')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';
    if (mobileGrid) mobileGrid.innerHTML = mobiles.length ? mobiles.map(p => renderProduct(p, 'mobile')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';
    if (clothesGrid) clothesGrid.innerHTML = clothes.length ? clothes.map(p => renderProduct(p, 'clothes')).join('') : '<p style="color:#666;width:100%;">Không có sản phẩm.</p>';

    // Category filtering
    const params = new URLSearchParams(window.location.search);
    const cat = categoryOverride || params.get('cat');
    
    const laptopsDiv = document.getElementById('laptops');
    const mobilesDiv = document.getElementById('mobiles');
    const clothesDiv = document.getElementById('clothes');
    const otherDiv = document.getElementById('other-products');

    // Hide all first
    if (laptopsDiv) laptopsDiv.style.display = 'none';
    if (mobilesDiv) mobilesDiv.style.display = 'none';
    if (clothesDiv) clothesDiv.style.display = 'none';
    if (otherDiv) otherDiv.style.display = 'none';

    if (cat === 'laptop') {
        if (laptopsDiv) laptopsDiv.style.display = 'block';
    } else if (cat === 'mobile') {
        if (mobilesDiv) mobilesDiv.style.display = 'block';
    } else if (cat === 'clothes') {
        if (clothesDiv) clothesDiv.style.display = 'block';
    } else {
        // Show all
        if (laptopsDiv) laptopsDiv.style.display = 'block';
        if (mobilesDiv) mobilesDiv.style.display = 'block';
        if (clothesDiv) clothesDiv.style.display = 'block';
        if (otherDiv) otherDiv.style.display = 'block';
    }
}

async function searchProducts() {
    const globalSearch = document.getElementById('global-search');
    const query = globalSearch ? globalSearch.value.trim() : '';
    if (!query) { displayData(allData); return; }
    try {
        const resp = await fetch(`/api/search/?q=${encodeURIComponent(query)}`);
        const data = await resp.json();
        displayData(data);
    } catch (err) { console.error('Search error:', err); }
}

function resetSearch() {
    const globalSearch = document.getElementById('global-search');
    if (globalSearch) globalSearch.value = '';
    
    // Xóa param trên URL khi bấm đặt lại
    const url = new URL(window.location);
    url.searchParams.delete('search');
    window.history.pushState({}, '', url);

    displayData(allData);
}

document.getElementById('global-search')?.addEventListener('input', e => {
    searchProducts();
});

// Run filter logic on load based on query params
document.addEventListener('DOMContentLoaded', () => {
    const p = new URLSearchParams(window.location.search);
    const cat = p.get('cat');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    if (cat === 'laptop') {
        document.getElementById('tab-laptop')?.classList.add('active');
    } else if (cat === 'mobile') {
        document.getElementById('tab-mobile')?.classList.add('active');
    } else if (cat === 'clothes') {
        document.getElementById('tab-clothes')?.classList.add('active');
    }

    const s = p.get('search');
    if (s) {
        document.getElementById('search-input').value = s;
        if(document.getElementById('global-search')) {
            document.getElementById('global-search').value = s;
        }
    }
});

function addToCart(productId, productType, productName, price) {
    const customerId = localStorage.getItem('customerId');
    const token = localStorage.getItem('token');
    if (!customerId || !token) {
        alert('Vui lòng đăng nhập để thêm vào giỏ hàng!');
        window.location.href = '/login/customer/';
        return;
    }
    fetch('/api/proxy/customer/api/cart/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customerId, productId, productType, productName, quantity: 1, price })
    })
    .then(res => res.json())
    .then(() => {
        // Show toast instead of alert
        showToast('Đã thêm vào giỏ hàng! 🛒');
        if (typeof updateCartBadge === 'function') updateCartBadge();
    })
    .catch(err => { alert('Lỗi thêm vào giỏ.'); });
}

function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:2rem;right:2rem;z-index:9999;background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);color:#6ee7b7;padding:1rem 1.5rem;border-radius:12px;font-weight:700;animation:slideIn 0.3s ease;';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

fetchProducts();
</script>
{% endblock %}
